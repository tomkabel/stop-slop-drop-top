name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Syntax check
        run: |
          node --check detect-ai.js
          node --check test-slop-removal.js
          for file in lib/*.js; do node --check "$file" || exit 1; done
      
      - name: Run heuristic detection test
        run: node detect-ai.js --detector heuristic --file samples/ai-text.txt
      
      - name: Run slop removal test
        run: npm run test:slop
