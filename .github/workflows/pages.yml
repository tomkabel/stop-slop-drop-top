# GitHub Actions workflow for deploying to Cloudflare Pages
# Required secrets:
#   CLOUDFLARE_API_TOKEN - Cloudflare API token with Pages edit permission
#   CLOUDFLARE_ACCOUNT_ID - Cloudflare account ID (found in Workers & Pages dashboard)

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build for Cloudflare Pages
        run: npm run cloudflare:build
        working-directory: web

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .output/static --project-name=stop-slop-drop-top --branch=production
          workingDirectory: web

      - name: Show output
        run: |
          echo "Deployment URL: ${{ steps.deploy.outputs.url }}"
