name: AI Code Review (MiniMax M2.5 via OpenRouter)

on:
  pull_request:
    branches: [main, dev]
  pull_request_target:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: AI Code Review (MiniMax M2.5)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get PR Diff
        id: get-diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Get the PR diff
          DIFF=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER.diff")
          
          # Save diff to file (truncate if too large for API)
          echo "$DIFF" > pr_diff.diff
          
          # Check file size
          SIZE=$(wc -c < pr_diff.diff)
          echo "Diff size: $SIZE bytes"
          
          # Truncate if larger than 100KB (OpenRouter has limits)
          if [ "$SIZE" -gt 100000 ]; then
            head -c 100000 pr_diff.diff > pr_diff_truncated.diff
            mv pr_diff_truncated.diff pr_diff.diff
            echo "Diff truncated to 100KB"
          fi
          
          # Convert to single line JSON string
          DIFF_CONTENT=$(cat pr_diff.diff | jq -Rs .)
          echo "diff_content=$DIFF_CONTENT" >> $GITHUB_OUTPUT

      - name: Run AI Code Review
        id: ai-review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          cat << 'EOF' > ai-review.js
          const fs = require('fs');
          const https = require('https');

          // Read the diff
          const diffContent = fs.readFileSync('pr_diff.diff', 'utf8');

          // Prepare the prompt
          const systemPrompt = `You are an expert code reviewer. Analyze the following pull request diff and provide a thorough code review. 
          
          Focus on:
          1. Security vulnerabilities
          2. Bug potential
          3. Code quality and best practices
          4. Performance issues
          5. Readability and maintainability
          6. Missing error handling
          7. Potential edge cases
          
          Format your response as a JSON array of review comments, each with:
          - "file": the file path
          - "line": approximate line number (or null if general)
          - "issue": description of the issue
          - "severity": "high", "medium", or "low"
          - "suggestion": how to fix it
          
          Only return valid JSON, no other text.`;

          const userPrompt = `PR Title: ${process.env.PR_TITLE}
          PR Description: ${process.env.PR_BODY || 'No description'}
          Author: ${process.env.PR_AUTHOR}
          
          Diff:
          ${diffContent}`;

          // Prepare OpenRouter API request
          const requestBody = JSON.stringify({
            model: "openrouter/minimax/m2.5",
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: userPrompt }
            ],
            max_tokens: 4000
          });

          const options = {
            hostname: 'openrouter.ai',
            port: 443,
            path: '/api/v1/chat/completions',
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${process.env.OPENROUTER_API_KEY}`,
              'HTTP-Referer': 'https://github.com/stop-slop-drop-top',
              'X-Title': 'Stop Slop Drop Top AI Review'
            }
          };

          const req = https.request(options, (res) => {
            let data = '';

            res.on('data', (chunk) => {
              data += chunk;
            });

            res.on('end', async () => {
              try {
                const response = JSON.parse(data);
                
                if (response.choices && response.choices[0]) {
                  const reviewContent = response.choices[0].message.content;
                  console.log('AI Review received, posting to PR...');
                  
                  // Try to parse as JSON, if fails post as text
                  let comments;
                  try {
                    comments = JSON.parse(reviewContent);
                  } catch (e) {
                    // Post as single comment if not valid JSON
                    console.log('Posting review as text...');
                    await postComment(process.env.GITHUB_TOKEN, process.env.REPO, process.env.PR_NUMBER, reviewContent);
                    return;
                  }
                  
                  // Post each comment
                  for (const comment of comments) {
                    await postComment(
                      process.env.GITHUB_TOKEN,
                      process.env.REPO,
                      process.env.PR_NUMBER,
                      `**${comment.severity.toUpperCase()}** - ${comment.file}${comment.line ? `:${comment.line}` : ''}\n\n${comment.issue}\n\n💡 ${comment.suggestion}`
                    );
                  }
                  
                  console.log('Review posted successfully!');
                } else {
                  console.log('Error: No response from AI');
                  console.log(data);
                }
              } catch (error) {
                console.error('Error processing response:', error.message);
                console.log('Raw response:', data);
              }
            });
          });

          req.on('error', (error) => {
            console.error('Error making request:', error.message);
          });

          req.write(requestBody);
          req.end();

          // Function to post comment to PR
          async function postComment(token, repo, prNumber, body) {
            const postData = JSON.stringify({ body });
            
            const [owner, repoName] = repo.split('/');
            
            const postOptions = {
              hostname: 'api.github.com',
              port: 443,
              path: `/repos/${owner}/${repoName}/issues/${prNumber}/comments`,
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28'
              }
            };

            return new Promise((resolve, reject) => {
              const postReq = https.request(postOptions, (res) => {
                let data = '';
                res.on('data', (chunk) => { data += chunk; });
                res.on('end', () => {
                  if (res.statusCode >= 200 && res.statusCode < 300) {
                    console.log('Comment posted successfully');
                    resolve();
                  } else {
                    console.log('Failed to post comment:', res.statusCode, data);
                    reject(new Error(`HTTP ${res.statusCode}`));
                  }
                });
              });

              postReq.on('error', reject);
              postReq.write(postData);
              postReq.end();
            });
          }
          EOF
          
          node ai-review.js

      - name: Review Summary
        if: always()
        run: |
          echo "## AI Code Review Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This PR was reviewed using **MiniMax M2.5** via OpenRouter." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Model Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Provider**: OpenRouter" >> $GITHUB_STEP_SUMMARY
          echo "- **Model**: MiniMax M2.5 (free tier)" >> $GITHUB_STEP_SUMMARY
          echo "- **Review Focus**: Security, bugs, code quality, performance" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Setup" >> $GITHUB_STEP_SUMMARY
          echo "1. Get your OpenRouter API key from [openrouter.ai](https://openrouter.ai)" >> $GITHUB_STEP_SUMMARY
          echo "2. Add \`OPENROUTER_API_KEY\` as a repository secret" >> $GITHUB_STEP_SUMMARY
          echo "3. The review runs automatically on PRs to \`main\` or \`dev\`" >> $GITHUB_STEP_SUMMARY