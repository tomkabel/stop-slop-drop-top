name: Detector Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Test heuristic detector on AI text
        run: node detect-ai.js --detector heuristic --file samples/ai-text.txt

      - name: Test heuristic detector on human text
        run: node detect-ai.js --detector heuristic --file samples/human-text.txt

      - name: Test slop removal
        run: npm run test:slop
